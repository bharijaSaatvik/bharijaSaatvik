<svg fill="none" viewBox="0 0 800 750" width="800" height="750" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.chat-wrap {
  width: 780px;
  background: #0d1117;
  border-radius: 16px;
  border: 1px solid #30363d;
  overflow: hidden;
}
.chat-top-bar {
  background: #161b22;
  padding: 14px 20px;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  gap: 10px;
}
.chat-top-bar .dots {
  display: flex;
  gap: 6px;
}
.chat-top-bar .dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}
.dot-red   { background: #ff5f57; }
.dot-yel   { background: #ffbd2e; }
.dot-grn   { background: #28c840; }
.chat-title {
  color: #8b949e;
  font-size: 13px;
  margin-left: 8px;
  font-weight: 600;
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #3fb950;
  margin-left: auto;
  animation: blink 1.5s infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}
.chat-body {
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  opacity: 0;
  animation: rise 0.5s ease forwards;
}
.row.right { flex-direction: row-reverse; }

.ava {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.ava-me { background: linear-gradient(135deg,#6e40c9,#58a6ff); }
.ava-you{ background: linear-gradient(135deg,#f78166,#d29922); }

.bubble {
  max-width: 460px;
  padding: 10px 15px;
  border-radius: 18px;
  font-size: 13px;
  line-height: 1.55;
  color: #e6edf3;
}
.bubble-me {
  background: #1f2937;
  border-bottom-left-radius: 4px;
}
.bubble-you {
  background: #1a4a8a;
  border-bottom-right-radius: 4px;
  color: #fff;
}
.sender {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 4px;
  display: block;
}
.sender-me  { color: #58a6ff; }
.sender-you { color: #a5c8ff; }

.pill {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  margin: 3px 2px 0 0;
}
.p-blue   { background:#1a3558; color:#58a6ff; }
.p-purple { background:#2d1a50; color:#bc8cff; }
.p-green  { background:#173326; color:#3fb950; }
.p-orange { background:#3a2210; color:#f0883e; }
.p-red    { background:#3a1515; color:#f47067; }

.typing-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  opacity: 0;
  animation: rise 0.5s ease forwards;
}
.typing-bubble {
  background: #1f2937;
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 12px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
}
.td {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #8b949e;
  animation: bounce 1.1s infinite ease-in-out;
}
.td:nth-child(2) { animation-delay: 0.18s; }
.td:nth-child(3) { animation-delay: 0.36s; }

@keyframes rise {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0);    }
}
@keyframes bounce {
  0%,80%,100% { transform: translateY(0); }
  40%         { transform: translateY(-7px); }
}

.row:nth-child(1)    { animation-delay: 0.3s;  }
.row:nth-child(2)    { animation-delay: 1.8s;  }
.row:nth-child(3)    { animation-delay: 3.5s;  }
.row:nth-child(4)    { animation-delay: 5.2s;  }
.row:nth-child(5)    { animation-delay: 6.9s;  }
.row:nth-child(6)    { animation-delay: 8.6s;  }
.row:nth-child(7)    { animation-delay: 10.3s; }
.row:nth-child(8)    { animation-delay: 12.0s; }
.row:nth-child(9)    { animation-delay: 13.7s; }
.row:nth-child(10)   { animation-delay: 15.4s; }
.typing-row          { animation-delay: 16.5s; }
</style>

<div class="chat-wrap">

  <div class="chat-top-bar">
    <div class="dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yel"></div>
      <div class="dot dot-grn"></div>
    </div>
    <span class="chat-title">💬 Chat with Saatvik Bharija</span>
    <div class="status-dot"></div>
  </div>

  <div class="chat-body">

    <div class="row right">
      <div class="ava ava-you">👤</div>
      <div class="bubble bubble-you">
        <span class="sender sender-you">Visitor</span>
        Hey! 👋 Who are you and what do you do?
      </div>
    </div>

    <div class="row">
      <div class="ava ava-me">🚀</div>
      <div class="bubble bubble-me">
        <span class="sender sender-me">Saatvik Bharija</span>
        Hey there! I'm a <b>DevOps Advocate</b> with <b>5+ years</b> of experience turning ☕ into scalable cloud infrastructure! 🏗️
      </div>
    </div>

    <div class="row right">
      <div class="ava ava-you">👤</div>
      <div class="bubble bubble-you">
        <span class="sender sender-you">Visitor</span>
        Wow! What are you working on right now? 🤔
      </div>
    </div>

    <div class="row">
      <div class="ava ava-me">🚀</div>
      <div class="bubble bubble-me">
        <span class="sender sender-me">Saatvik Bharija</span>
        🔭 Currently building in these areas:
        <br/>
        <span class="pill p-blue">☁️ Cloud-Native</span>
        <span class="pill p-purple">🤖 AI Solutions</span>
        <span class="pill p-green">🏗️ Platform Eng</span>
        <span class="pill p-orange">🔄 DevOps</span>
      </div>
    </div>

    <div class="row right">
      <div class="ava ava-you">👤</div>
      <div class="bubble bubble-you">
        <span class="sender sender-you">Visitor</span>
        What's your tech stack? 💻
      </div>
    </div>

    <div class="row">
      <div class="ava ava-me">🚀</div>
      <div class="bubble bubble-me">
        <span class="sender sender-me">Saatvik Bharija</span>
        Here's my arsenal! 🔫
        <br/>
        <span class="pill p-blue">🐍 Python</span>
        <span class="pill p-green">🐳 Docker</span>
        <span class="pill p-blue">⛵ Kubernetes</span>
        <span class="pill p-purple">🏗️ Terraform</span>
        <span class="pill p-orange">☁️ AWS/Azure/GCP</span>
        <span class="pill p-red">🔧 Jenkins</span>
        <span class="pill p-green">🔄 ArgoCD</span>
      </div>
    </div>

    <div class="row right">
      <div class="ava ava-you">👤</div>
      <div class="bubble bubble-you">
        <span class="sender sender-you">Visitor</span>
        Can we collaborate on something? 🤝
      </div>
    </div>

    <div class="row">
      <div class="ava ava-me">🚀</div>
      <div class="bubble bubble-me">
        <span class="sender sender-me">Saatvik Bharija</span>
        Absolutely! 👯 Always looking to collaborate on <b>open-source projects</b> and <b>DevOps initiatives</b>. Let's build something epic! 💪
      </div>
    </div>

    <div class="row right">
      <div class="ava ava-you">👤</div>
      <div class="bubble bubble-you">
        <span class="sender sender-you">Visitor</span>
        Any fun facts? 😄
      </div>
    </div>

    <div class="row">
      <div class="ava ava-me">🚀</div>
      <div class="bubble bubble-me">
        <span class="sender sender-me">Saatvik Bharija</span>
        ⚡ I LOVE sharing knowledge through <b>training and mentoring</b>! 🎓<br/>
        Also my coffee = <code>float("inf")</code> ☕ and I blame DNS for everything 😂<br/>
        Motto: <i>"Automate once, sleep forever!"</i> 🚀
      </div>
    </div>

    <div class="typing-row">
      <div class="ava ava-me">🚀</div>
      <div class="typing-bubble">
        <div class="td"></div>
        <div class="td"></div>
        <div class="td"></div>
      </div>
    </div>

  </div>
</div>
</div>
</foreignObject>
</svg>
